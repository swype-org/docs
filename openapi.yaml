            id: pazfl1s3wle1w
        nickname:
          type: string
          nullable: true
          description: Optional user-chosen display name for this account.
        wallets:
          type: array
          x-stoplight:
            id: gluewvsgw4cia
          items:
            $ref: '#/components/schemas/Wallet'
            x-stoplight:
              id: ptqviqa40gbv2
        createDate:
          type: string
          x-stoplight:
            id: lgildxuny5lpz
          format: date-time
        updateDate:
          type: string
          x-stoplight:
            id: w4bxfwp0jwizc
          format: date-time
        authorizationSessions:
          type: array
          x-stoplight:
            id: l8o6yarw2a5w0
          items:
            $ref: '#/components/schemas/AuthorizationSession'
            x-stoplight:
              id: z5q9sc2r1butr
        remainingAllowance:
          type: number
          nullable: true
          description: >-
            Remaining One-Tap allowance in USD for this account, calculated as
            defaultAllowance minus the sum of completed transfer amounts since the
            last Permit2 approval. Null when no allowance has been configured.
      description: Account which contains a list of wallets
    AuthorizationSession:
      title: AuthorizationSession
      x-stoplight:
        id: cixhozwyz0kcn
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          x-stoplight:
            id: v10ybwo88vej4
          format: uuid
        status:
          type: string
          x-stoplight:
            id: ycpb9alsk5bw2
        uri:
          type: string
          x-stoplight:
            id: f4ecf4cwgn8w8
    AuthorizationSessionDetail:
      title: AuthorizationSessionDetail
      type: object
      description: Authorization session with its ordered list of actions
      required:
        - id
        - status
        - actions
      properties:
        id:
          type: string
          format: uuid
          description: Unique id of authorization session
        status:
          type: string
          description: Status of authorization session
        uri:
          type: string
          description: Deep-link URI for the authorization session
        selectedTokenAddress:
          type: string
          description: Pre-selected ERC-20 token contract address for authorization. When present, the auth UI uses this to override the default source selection.
        selectedChainId:
          type: integer
          description: Pre-selected EVM numeric chain ID (e.g. 8453 for Base). When present, the auth UI uses this to override the default source selection.
        actions:
          type: array
          description: Ordered list of authorization actions to be performed sequentially
          items:
            $ref: '#/components/schemas/AuthorizationAction'
    AuthorizationAction:
      title: AuthorizationAction
      type: object
      description: A single authorization action to be performed within a session
      required:
        - id
        - type
        - status
        - orderIndex
      properties:
        id:
          type: string
          format: uuid
          description: Unique id of authorization action
        type:
          $ref: '#/components/schemas/AuthorizationActionType'
          description: Type of authorization action
        status:
          type: string
          description: Status of authorization action
        orderIndex:
          type: integer
          description: Execution order of the action within the session (ascending)
        metadata:
          type: object
          description: >
            Action-specific parameters. For OPEN_PROVIDER, may include
            `wagmiConnectorId` (string) identifying which Wagmi connector
            the client should use to open the correct wallet. For
            SELECT_SOURCE, includes `options` (sorted source candidates) and
            `recommended` (top default source). For SWITCH_CHAIN, includes
            `targetChainId` (hex chain id like "0x2105").
          properties:
            wagmiConnectorId:
              type: string
              description: >
                The Wagmi connector ID corresponding to the provider the
                user selected (e.g. "metaMask", "coinbaseWalletSDK").
                Present only on OPEN_PROVIDER actions.
            targetChainId:
              type: string
              description: >
                Required for SWITCH_CHAIN actions. Hex-encoded EVM chain id
                that the wallet must switch to (e.g. "0x2105").
            options:
              type: array
              description: >
                Sorted source options for SELECT_SOURCE actions. The first
                option is the server-ranked default.
              items:
                type: object
                required:
                  - chainName
                  - chainId
                  - tokenSymbol
                  - tokenAddress
                  - decimals
                  - rawBalance
                properties:
                  chainName:
                    type: string
                  chainId:
                    type: string
                  tokenSymbol:
                    type: string
                  tokenAddress:
                    type: string
                  decimals:
                    type: integer
                  rawBalance:
                    type: string
            recommended:
              type: object
              description: >
                The recommended default for SELECT_SOURCE, which matches the
                first entry in metadata.options.
              required:
                - chainName
                - tokenSymbol
              properties:
                chainName:
                  type: string
                tokenSymbol:
                  type: string
            selectionPolicy:
              type: string
              description: Optional human-readable summary of server ranking policy.
    AuthorizationActionType:
      title: AuthorizationActionType
      enum:
        - OPEN_PROVIDER
        - SELECT_SOURCE
        - SWITCH_CHAIN
        - CREATE_SMART_ACCOUNT
        - DEPLOY_SMART_ACCOUNT
        - APPROVE_PERMIT2
        - SIGN_PERMIT2
    AuthorizationActionCompleteRequest:
      title: AuthorizationActionCompleteRequest
      type: object
      description: Request body to report the completion of an authorization action
      required:
        - status
        - result
      properties:
        status:
          type: string
          enum:
            - COMPLETED
          description: The completion status of the action
        result:
          type: object
          description: >
            Action-specific result data (e.g. accounts and chainId from
            OPEN_PROVIDER; selectedChainName and selectedTokenSymbol from
            SELECT_SOURCE).
    UserConfig:
      title: UserConfig
      type: object
      description: User-level configuration preferences
      properties:
        defaultAllowance:
          type: number
          minimum: 0
          description: Default Permit2 allowance amount (in USD). When set, the SDK will request this amount during Permit2 signing so future transfers within this threshold can skip re-authorization.
        passkey:
          type: object
          nullable: true
          description: Most recent registered WebAuthn passkey credential, or null if none registered. Kept for backward compatibility; prefer passkeys array.
          properties:
            credentialId:
              type: string
              description: Base64-encoded WebAuthn credential ID
            publicKey:
              type: string
              description: Base64-encoded SPKI public key
            lastVerificationToken:
              type: string
              nullable: true
              description: UUID written during the most recent popup verification. Used as a server-side fallback when BroadcastChannel/postMessage are blocked by Safari ITP.
        passkeys:
          type: array
          description: All registered WebAuthn passkey credentials for this user
          items:
            type: object
            properties:
              credentialId:
                type: string
                description: Base64-encoded WebAuthn credential ID
              publicKey:
                type: string
                description: Base64-encoded SPKI public key
              lastVerificationToken:
                type: string
                nullable: true
                description: UUID written during the most recent popup verification. Used as a server-side fallback when BroadcastChannel/postMessage are blocked by Safari ITP.
    UserConfigUpdateRequest:
      title: UserConfigUpdateRequest
      type: object
      description: Request body for updating user configuration
      required:
        - config
      properties:
        config:
          $ref: '#/components/schemas/UserConfig'
    UserConfigResponse:
      title: UserConfigResponse
      type: object
      description: Response after updating user configuration
      required:
        - id
        - config
      properties:
        id:
          type: string
          format: uuid
          description: Internal user ID
        config:
          $ref: '#/components/schemas/UserConfig'
    RegisterPasskeyRequest:
      title: RegisterPasskeyRequest
      type: object
      description: Request body to register a WebAuthn passkey credential
      required:
        - credentialId
        - publicKey
      properties:
        credentialId:
          type: string
          description: Base64-encoded WebAuthn credential ID
        publicKey:
          type: string
          description: Base64-encoded SPKI public key from the WebAuthn attestation response
    RegisterPasskeyResponse:
      title: RegisterPasskeyResponse
      type: object
      description: Response after registering a passkey
      required:
        - hasPasskey
      properties:
        hasPasskey:
          type: boolean
          description: Always true after successful registration
    UpdatePasskeyActivityRequest:
      title: UpdatePasskeyActivityRequest
      type: object
      description: Request body to report passkey activity (verification or usage)
      required:
        - credentialId
      properties:
        credentialId:
          type: string
          description: Base64-encoded WebAuthn credential ID of the passkey that was just verified
        verificationToken:
          type: string
          format: uuid
          description: UUID generated by the caller before opening the popup. Stored on the passkey row so the opener can confirm verification via server-side check when client-side channels are blocked.
    UpdatePasskeyActivityResponse:
      title: UpdatePasskeyActivityResponse
      type: object
      description: Response after updating passkey activity
      required:
        - updated
      properties:
        updated:
          type: boolean
          description: Always true after successful update
    AccountCreateRequest:
      title: AccountCreateRequest
      type: object
      description: Request body for creating a new account and its authorization session.
      required:
        - name
        - credentialId
        - providerId
      properties:
        id:
          type: string
          format: uuid
          description: Client-supplied UUID v4 used as the account ID and idempotency key. If omitted, a random UUID is generated server-side.
        name:
          type: string
          minLength: 1
          description: Display name for the account (e.g. the wallet provider name).
        credentialId:
          type: string
          minLength: 1
          description: WebAuthn credential ID used to scope the account.
        providerId:
          type: string
          format: uuid
          description: ID of the wallet provider to authorize with (e.g. MetaMask, Coinbase Wallet).
        nickname:
          type: string
          minLength: 1
          description: Optional user-chosen display name for this account.
    AccountUpdateRequest:
      title: AccountUpdateRequest
      type: object
      description: Request body for updating an account.
      required:
        - nickname
      properties:
        nickname:
          type: string
          nullable: true
          minLength: 1
          description: User-chosen display name for this account, or null to clear.
    AccountAuthorizationSessionCreateRequest:
      title: AccountAuthorizationSessionCreateRequest
      type: object
      description: Request body for creating a new authorization session on an existing account (e.g. to re-authorize with a higher Permit2 allowance or authorize a different token).
      required:
        - credentialId
      properties:
        credentialId:
          type: string
          minLength: 1
          description: WebAuthn credential ID used to scope the account.
        tokenAddress:
          type: string
          pattern: '^0x[0-9a-fA-F]{40}$'
          description: Optional ERC-20 token contract address to pre-select for authorization.
        chainId:
          type: integer
          description: Optional EVM numeric chain ID (e.g. 8453 for Base) to pre-select for authorization.
  securitySchemes:
    PrivyAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: A Privy user access token. Obtain this via the Privy SDK and pass it in the Authorization header.
    AdminCognitoAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: A Cognito access token issued to an authenticated admin user.
    AuthorizationSessionToken:
      type: apiKey
      in: header
      name: x-authorization-session-token
      description: Authorization session token (64-char hex) used for transfer signing in deeplink wallet flows.
security:
  - PrivyAuth: []
