      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    x-stoplight:
                      id: jhuuxm7nvslbx
                    items:
                      $ref: '#/components/schemas/Wallet'
                      x-stoplight:
                        id: 1gd4bt6uwmo3w
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: list-wallets
      x-stoplight:
        id: dycmnc8jos8ho
      description: List Wallets
    parameters: []
  /v1/chains:
    get:
      summary: List Chains
      tags:
        - Chains
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chain'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: list-chains
      description: List all supported blockchain chains with their Swype identifiers
    parameters: []
  /v1/authorization-sessions:
    post:
      summary: Your POST endpoint
      tags: []
      responses: {}
      operationId: post-v1-authorization-sessions
      x-stoplight:
        id: wzygopnqci2ik
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                '':
                  type: string
                  x-stoplight:
                    id: 0evwq7yssirpw
  '/v1/authorization-sessions/{authorizationSessionId}':
    parameters:
      - schema:
          type: string
          format: uuid
        name: authorizationSessionId
        in: path
        required: true
        description: Id of authorization session
    get:
      summary: Get Authorization Session
      tags:
        - Authorization Sessions
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationSessionDetail'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: get-authorization-session
      description: Get Authorization Session by Id. Returns session metadata and an ordered list of authorization actions. Returns 404 if the session does not exist or has expired. This endpoint is unauthenticated.
  '/v1/authorization-actions/{authorizationActionId}':
    parameters:
      - schema:
          type: string
          format: uuid
        name: authorizationActionId
        in: path
        required: true
        description: Id of authorization action
    patch:
      summary: Complete Authorization Action
      tags:
        - Authorization Actions
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizationActionCompleteRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationSessionDetail'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: complete-authorization-action
      description: Report the completion of an authorization action with its result data. The server marks the action as completed, stores the result, and generates subsequent actions if applicable (e.g. SELECT_SOURCE after OPEN_PROVIDER; APPROVE_PERMIT2 and SIGN_PERMIT2 after SELECT_SOURCE). For SELECT_SOURCE, the client should submit result.selectedChainName and result.selectedTokenSymbol. Returns the updated authorization session detail with all actions. This endpoint is unauthenticated; validated via session expiry.
  /v1/users:
    patch:
      summary: Update User Config
      tags:
        - Users
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserConfigResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: patch-user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserConfigUpdateRequest'
      description: Update the authenticated user's configuration. Currently supports setting the default Permit2 allowance amount.
  /v1/users/config:
    get:
      summary: Get User Config
      tags:
        - Users
      security:
        - PrivyAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserConfigResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: get-user-config
      description: Retrieve the authenticated user's configuration, including passkey registration status.
  /v1/users/config/passkey:
    post:
      summary: Register Passkey
      tags:
        - Users
      security:
        - PrivyAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterPasskeyResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
