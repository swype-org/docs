openapi: 3.1.0
x-stoplight:
  id: ttg042d6xbr8b
info:
  title: Core
  version: '1.0'
  summary: Core Swype API
servers:
  - url: 'https://api.swype.network'
paths:
  /v1/providers:
    get:
      summary: List Providers
      tags:
        - Providers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    x-stoplight:
                      id: 9z77e73gusos5
                    type: array
                    items:
                      $ref: '#/components/schemas/Provider'
                      x-stoplight:
                        id: v92ekdj4oh68p
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: list-providers
      x-stoplight:
        id: rg2n8pfl1c2d3
      description: List Providers
    parameters: []
  /v1/transfers:
    post:
      summary: Create Transfer
      tags:
        - Transfers
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable Entity (WebDAV)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: create-transfer
      x-stoplight:
        id: fnvjctol3ruwy
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferCreateRequest'
      description: Create Transfer
    get:
      summary: List Transfers
      tags:
        - Transfers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    x-stoplight:
                      id: 0l5i6va15yooj
                    items:
                      $ref: '#/components/schemas/Transfer'
                      x-stoplight:
                        id: 8dmqlhbl63qjj
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: list-transfers
      x-stoplight:
        id: gy6bsn4k4vp7n
      description: List Transfers
    parameters: []
  '/v1/transfers/{transferId}':
    parameters:
      - schema:
          type: string
        name: transferId
        in: path
        required: true
        description: Id of transfer
    get:
      summary: Get Transfer
      tags:
        - Transfers
      parameters:
        - in: header
          name: x-authorization-session-token
          required: false
          schema:
            type: string
            pattern: '^[0-9a-f]{64}$'
          description: Authorization session token from the deeplink flow. Provide this header instead of Authorization Bearer in wallet in-app browsers.
      security:
        - PrivyAuth: []
        - AuthorizationSessionToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: get-transfer
      x-stoplight:
        id: 81eny5927aefb
      description: Get Transfer by Id
    patch:
      summary: Sign Transfer
      tags:
        - Transfers
      description: >
        Submit a passkey-signed UserOperation for a transfer. The transfer must
        be in AUTHORIZED status and have a signPayload prepared by the backend.
        On success, the signed UserOp is stored and ERC-20 send jobs are
        dispatched to the bundler.
        This endpoint accepts either a Privy bearer token or an
        x-authorization-session-token header.
      operationId: sign-transfer
      parameters:
        - in: header
          name: x-authorization-session-token
          required: false
          schema:
            type: string
            pattern: '^[0-9a-f]{64}$'
          description: Authorization session token from the deeplink flow. Provide this header instead of Authorization Bearer when signing inside wallet in-app browsers.
      security:
        - PrivyAuth: []
        - AuthorizationSessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferSignRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    servers: []
  '/v1/merchants/{merchantId}/public-key':
    parameters:
      - schema:
          type: string
          minLength: 1
          maxLength: 128
        name: merchantId
        in: path
        required: true
        description: Merchant identifier used in the signed payment link.
    get:
      summary: Get Merchant Public Key
      tags:
        - Merchants
      operationId: get-merchant-public-key
      description: Fetch the active public key for a registered merchant so clients can verify signed payment links before rendering the payment UI.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantPublicKey'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/admin/merchants:
    get:
      summary: List Merchants
      tags:
        - Admin Merchants
      operationId: list-admin-merchants
      description: List registered merchants for internal admin management.
      security:
        - AdminCognitoAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminMerchant'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create Merchant
      tags:
        - Admin Merchants
      operationId: create-admin-merchant
      description: Register a merchant that can issue signed transfer authorizations.
      security:
        - AdminCognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminMerchantCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMerchant'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/v1/admin/merchants/{merchantId}':
    parameters:
      - schema:
          type: string
          minLength: 1
          maxLength: 128
        name: merchantId
        in: path
        required: true
        description: Merchant identifier.
    get:
      summary: Get Merchant
      tags:
        - Admin Merchants
      operationId: get-admin-merchant
      description: Fetch full merchant details for internal admin management.
      security:
        - AdminCognitoAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMerchant'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      summary: Update Merchant
      tags:
        - Admin Merchants
      operationId: update-admin-merchant
      description: Update mutable merchant settings such as display name, status, signing algorithm, or public key.
      security:
        - AdminCognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminMerchantUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMerchant'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/v1/admin/users/{email}':
    parameters:
      - schema:
          type: string
          format: email
        name: email
        in: path
        required: true
        description: The email address of the user to reset.
    delete:
      summary: Reset User
      tags:
        - Admin
      operationId: resetUser
      description: Completely wipes all data associated with a user identified by email address. Deletes passkeys, smart accounts, wallets, accounts, transfers, permit2 approvals, delegations, authorization sessions, and the user record itself.
      security:
        - AdminCognitoAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  email:
                    type: string
                    format: email
                required:
                  - message
                  - email
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/accounts:
    get:
      summary: List Accounts
      tags:
        - Accounts
      parameters:
        - in: query
          name: credentialId
          required: true
          schema:
            type: string
            minLength: 1
          description: WebAuthn credential ID used to scope account visibility.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    x-stoplight:
                      id: mqlbmii6opb81
                    items:
                      $ref: '#/components/schemas/Account'
                      x-stoplight:
                        id: lfciswiai71by
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: list-accounts
      x-stoplight:
        id: r4333do5pqapj
      description: List Accounts
    post:
      summary: Create Account
      tags:
        - Accounts
      operationId: create-account
      description: Create a new account scoped to a credential. Uses upsert semantics — if an account with the same name and credentialId already exists, the existing account is returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/v1/accounts/{accountId}':
    parameters:
      - schema:
          type: string
          format: uuid
        name: accountId
        in: path
        required: true
        description: Id of account
    get:
      summary: Get Account
      tags:
        - Accounts
      operationId: get-account
      description: Fetch a single account by ID with its wallets and authorization sessions. Uses DB-cached balances rather than live on-chain lookups, making it suitable for polling.
      parameters:
        - schema:
            type: string
          name: credentialId
          in: query
          required: true
          description: WebAuthn credential ID used to scope the account
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete Account
      tags:
        - Accounts
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: delete-account
      description: Delete an account and all associated data (wallets, token balances, permit2 approvals, smart account delegations). This action is irreversible.
    patch:
      summary: Update Account
      tags:
        - Accounts
      operationId: update-account
      description: Update an account's nickname.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/v1/accounts/{accountId}/authorization-sessions':
    parameters:
      - schema:
          type: string
          format: uuid
        name: accountId
        in: path
        required: true
        description: Id of account
    post:
      summary: Create Authorization Session for Account
      tags:
        - Accounts
      operationId: create-account-authorization-session
      description: Creates a new authorization session for an existing account so the user can re-authorize their wallet (e.g. sign a new Permit2 with a higher allowance).
      security:
        - PrivyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountAuthorizationSessionCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationSession'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
